<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desafio do Mascote</title>
<style>
body{
    margin:0;
    font-family:Segoe UI,Arial,sans-serif;
    background:#081a33;
    color:#fff;
}

.hero{
    min-height:100vh;
    background:
        linear-gradient(
            rgba(5,15,35,.75),
            rgba(5,15,35,.90)
        ),
        url('banner.jpg');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

.topo{
    padding:30px 50px;
}

.logo{
    width:220px;
}

.hero-content{
    max-width:1400px;
    margin:auto;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:40px;
    padding:40px 60px;
}

.hero-text{
    max-width:600px;
}

.hero-text h1{
    font-size:80px;
    line-height:.95;
    margin:0;
    font-weight:900;
}

.hero-text p{
    font-size:26px;
    margin:25px 0;
}

.hero-mascote img{
    width:500px;
    max-width:100%;
}

.btnHero{
    background:#d71920;
    color:#fff;
    border:none;
    border-radius:12px;
    padding:18px 40px;
    font-size:22px;
    font-weight:700;
    cursor:pointer;
    transition:.3s;
}

.btnHero:hover{
    transform:translateY(-2px);
}

.btn{
    background:#d71920;
    color:#fff;
    border:none;
    padding:14px 28px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

.card{
    max-width:900px;
    margin:30px auto;
    background:rgba(255,255,255,.08);
    padding:25px;
    border-radius:18px;
}

.hidden{
    display:none;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    border:none;
    box-sizing:border-box;
}

.progress{
    height:18px;
    background:#223b64;
    border-radius:20px;
    overflow:hidden;
}

.bar{
    height:18px;
    width:0;
    background:#d71920;
}

@media(max-width:900px){

    .hero-content{
        flex-direction:column;
        text-align:center;
    }

    .hero-text h1{
        font-size:50px;
    }

    .hero-text p{
        font-size:20px;
    }

    .hero-mascote img{
        width:320px;
    }

    .topo{
        text-align:center;
        padding:20px;
    }

    .logo{
        width:180px;
    }
}
</style>
</head>
<body>
<section class="hero" id="inicio">

    <div class="topo">
        <img src="logo.png" class="logo">
    </div>

    <div class="hero-content">

        <div class="hero-text">

            <h1>DESAFIO<br>DO MASCOTE</h1>

            <p>
                Descubra a identidade do mascote da Equipe Estados Unidos
                e concorra a um brinde exclusivo.
            </p>

            <button class="btnHero" onclick="iniciar()">
                COMEÇAR DESAFIO
            </button>

        </div>

        <div class="hero-mascote">
            <img src="lincoln.png">
        </div>

    </div>

</section>

<div class="card hidden" id="quiz">
<div class="progress"><div class="bar" id="bar"></div></div>
<h2 id="titulo"></h2>
<p id="pergunta"></p>
<input id="resp" placeholder="Digite sua resposta">
<button class="btn" onclick="validar()">VALIDAR</button>
<p id="msg"></p>
</div>

<div class="card hidden" id="final">
<h2>🎯 Desafio Final</h2>
<p>Após analisar todas as pistas, qual é o nome do nosso mascote?</p>
<input id="finalResp">
<button class="btn" onclick="validarFinal()">ENVIAR RESPOSTA</button>
</div>

<div class="card hidden" id="cadastro">
<h2>🎉 Parabéns!</h2>
<p>Você solucionou o desafio. Preencha seus dados para receber o brinde.</p>
<input id="nome" placeholder="Nome">
<input id="setor" placeholder="Setor">
<input id="email" placeholder="E-mail">
<input id="telefone" placeholder="Telefone">
<button class="btn" onclick="enviarCadastro()">RECEBER BRINDE</button>
</div>

<script>
const perguntas=[
["Pista 1","Qual é o número romano que representa cinquenta?","L"],
["Pista 2","Qual é o menor valor representado na numeração romana?","I"],
["Pista 3","Qual é a décima quarta letra do alfabeto?","N"],
["Pista 4","Qual palavra representa a capacidade de cumprir aquilo que foi prometido?","COMPROMISSO"],
["Pista 5","Qual letra está entre N e P?","O"],
["Pista 6","Na numeração romana, qual letra representa novamente o valor cinquenta?","L"],
["Pista 7","Qual é a primeira letra do mês de Novembro?","N"]
];
let i=0;
function iniciar(){inicio.style.display='none';quiz.classList.remove('hidden');carregar();}
function carregar(){titulo.innerText=perguntas[i][0];pergunta.innerText=perguntas[i][1];bar.style.width=(i/perguntas.length*100)+'%';msg.innerText='';}
function validar(){
 if(resp.value.trim().toUpperCase()===perguntas[i][2]){
   i++;
   resp.value='';
   if(i<perguntas.length){carregar();}
   else{quiz.classList.add('hidden');final.classList.remove('hidden');}
 } else msg.innerText='Resposta incorreta.';
}
function validarFinal(){
 if(finalResp.value.trim().toUpperCase()==='LINCOLN'){
   final.classList.add('hidden');
   cadastro.classList.remove('hidden');
 } else alert('Resposta incorreta');
}
function enviarCadastro() {

  const nome = document.getElementById("nome").value.trim();
  const setor = document.getElementById("setor").value.trim();
  const email = document.getElementById("email").value.trim();
  const telefone = document.getElementById("telefone").value.trim();

  if (!nome || !setor || !email || !telefone) {
    alert("Preencha todos os campos.");
    return;
  }

  const url =
    "https://script.google.com/macros/s/AKfycbxy3ff4V15ZmqaXijpoB_TD71o-z6SHyAxzLSk5ka0rAlYv3ND_65LlSBsnlWf2mxB6/exec"
    + "?nome=" + encodeURIComponent(nome)
    + "&setor=" + encodeURIComponent(setor)
    + "&email=" + encodeURIComponent(email)
    + "&telefone=" + encodeURIComponent(telefone);

  window.open(url, "_blank");

  alert("Parabéns! Seu cadastro foi realizado com sucesso. Em breve entraremos em contato para a entrega do brinde.");

  document.getElementById("nome").value = "";
  document.getElementById("setor").value = "";
  document.getElementById("email").value = "";
  document.getElementById("telefone").value = "";
}

</script>
</body>
</html>
